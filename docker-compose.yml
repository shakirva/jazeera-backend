version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jazeera-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: jazeera_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jazeera-redis
    restart: always
    ports:
      - '6380:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
